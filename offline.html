<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>Offline – ExpenseTracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  </style>
</head>
<body>
  <div class="text-center p-4">
    <div class="mb-4">
      <i class="bi bi-wifi-off" style="font-size:4rem;color:#6c757d"></i>
    </div>
    <h2 class="fw-bold mb-2">You're Offline</h2>
    <p class="text-muted mb-4">No internet connection detected. Your data is safe in IndexedDB and will sync when you're back online.</p>
    <div class="d-flex gap-2 justify-content-center flex-wrap">
      <a href="index.html" class="btn btn-primary">
        <i class="bi bi-house me-1"></i>Go to Dashboard
      </a>
      <button class="btn btn-outline-secondary" onclick="window.location.reload()">
        <i class="bi bi-arrow-clockwise me-1"></i>Retry
      </button>
    </div>
  </div>
</body>
</html>
